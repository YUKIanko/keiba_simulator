<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keiba Simulator Mockup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <main class="frame">
      <header class="hero">
        <div>
          <p class="eyebrow">Keiba Simulator v0.1</p>
          <h1>Race Snapshot</h1>
          <p class="sub">JSONを読み込んで最低限の可視化を行うモックアップ。</p>
        </div>
        <label class="file-input">
          <span>JSONを選択</span>
          <input id="fileInput" type="file" accept="application/json" />
        </label>
      </header>

      <section class="grid">
        <article class="panel" id="courseBoard">
          <h2>Course Board</h2>
          <div class="course-meta" id="courseKey"></div>
          <div class="board">
            <div class="segment">Start</div>
            <div class="segment">1C</div>
            <div class="segment">Back</div>
            <div class="segment">3C</div>
            <div class="segment">4C</div>
            <div class="segment">Finish</div>
          </div>
          <div class="lane" id="laneTracks"></div>
        </article>
        <article class="panel" id="raceMeta">
          <h2>Race</h2>
          <div class="meta-row">
            <div>
              <p class="meta-label">Race Name</p>
              <p class="meta-value" id="raceName">未読込</p>
            </div>
            <div>
              <p class="meta-label">Course</p>
              <p class="meta-value" id="courseMeta">-</p>
            </div>
          </div>
          <div class="notes">
            <p class="meta-label">Scenario</p>
            <p id="scenarioComment">JSONを読み込んでください。</p>
          </div>
          <div class="notes">
            <p class="meta-label">Short Memo</p>
            <p id="shortMemo">-</p>
          </div>
        </article>

        <article class="panel" id="worldlines">
          <h2>Worldlines</h2>
          <div id="worldlineList" class="pill-list">
            <span class="pill">未読込</span>
          </div>
          <p class="hint" id="worldlineHint">ワールドラインを選択できます。</p>
        </article>

        <article class="panel wide" id="horseTable">
          <h2>Horses</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>No</th>
                  <th>Horse</th>
                  <th>LapType</th>
                  <th>Win</th>
                  <th>In3</th>
                  <th>Traffic</th>
                  <th>Wide</th>
                </tr>
              </thead>
              <tbody id="horseRows">
                <tr>
                  <td colspan="7" class="empty">JSONを読み込んでください。</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      </section>

      <section class="panel" id="devilSpeak">
        <h2>DevilSpeak</h2>
        <p id="devilText">-</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
